<div class="d-flex mb-3 {% if comment.parent %}ms-4{% endif %}" id="comment-{{ comment.pk }}">
  <div class="flex-shrink-0">
    <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width:32px;height:32px;font-size:0.8rem;">
      {{ comment.author.first_name|default:comment.author.username|truncatechars:1 }}
    </div>
  </div>
  <div class="flex-grow-1 ms-2">
    <div class="d-flex align-items-center mb-1">
      <strong class="me-2">{{ comment.author.get_full_name|default:comment.author.username }}</strong>
      <small class="text-muted">{{ comment.created_at|timesince }} ago</small>
    </div>
    <div class="comment-body">{{ comment.body_html|safe }}</div>
    <div class="mt-1">
      <button class="btn btn-link btn-sm p-0 text-muted"
              hx-get="#"
              data-bs-toggle="collapse"
              data-bs-target="#reply-form-{{ comment.pk }}">
        Reply
      </button>
    </div>
    <div class="collapse mt-2" id="reply-form-{{ comment.pk }}">
      <form hx-post="{% url 'collaboration:reply' comment.pk %}"
            hx-target="#comment-list"
            hx-swap="beforeend">
        {% csrf_token %}
        <div class="input-group input-group-sm">
          <input type="text" name="body" class="form-control" placeholder="Write a reply...">
          <button type="submit" class="btn btn-outline-primary btn-sm">Send</button>
        </div>
      </form>
    </div>
  </div>
</div>
