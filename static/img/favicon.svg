<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#00214D"/>
  <g fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Calendar outline -->
    <rect x="6" y="8" width="20" height="18" rx="2"/>
    <!-- Calendar hooks -->
    <line x1="11" y1="5" x2="11" y2="11"/>
    <line x1="21" y1="5" x2="21" y2="11"/>
    <!-- Horizontal divider -->
    <line x1="6" y1="14" x2="26" y2="14"/>
    <!-- Week dots -->
    <circle cx="11" cy="18.5" r="1.2" fill="#fff" stroke="none"/>
    <circle cx="16" cy="18.5" r="1.2" fill="#fff" stroke="none"/>
    <circle cx="21" cy="18.5" r="1.2" fill="#fff" stroke="none"/>
    <circle cx="11" cy="23" r="1.2" fill="#fff" stroke="none"/>
    <circle cx="16" cy="23" r="1.2" fill="#fff" stroke="none"/>
  </g>
</svg>
