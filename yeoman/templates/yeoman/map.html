{% extends "base.html" %}

{% block title %}Map{% endblock %}

{% block extra_css %}
<link href="https://api.mapbox.com/mapbox-gl-js/v2.10.0/mapbox-gl.css" rel="stylesheet">
<style>#map { height: 600px; border-radius: 0.375rem; }</style>
{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Event Map</h2>
    <a href="{% url 'yeoman:invitation_list' %}" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-list me-1"></i>List View
    </a>
  </div>
  <div class="card">
    <div class="card-body">
      <div id="map"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://api.mapbox.com/mapbox-gl-js/v2.10.0/mapbox-gl.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  mapboxgl.accessToken = '{{ mapbox_token }}';

  var map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/streets-v12',
    center: [-72.7, 41.6],
    zoom: 8.5
  });

  map.addControl(new mapboxgl.NavigationControl(), 'top-right');

  fetch('{% url "yeoman:map_markers_json" %}')
    .then(r => r.json())
    .then(function(markers) {
      markers.forEach(function(m) {
        // Create marker element
        var el = document.createElement('div');
        el.style.width = '16px';
        el.style.height = '16px';
        el.style.borderRadius = '50%';
        el.style.backgroundColor = m.color;
        el.style.border = '2px solid #fff';
        el.style.boxShadow = '0 1px 4px rgba(0,0,0,0.3)';
        el.style.cursor = 'pointer';

        // Create popup
        var popup = new mapboxgl.Popup({ offset: 12, maxWidth: '280px' })
          .setHTML(
            '<strong><a href="' + m.url + '">' + m.title + '</a></strong><br>' +
            m.date + '<br>' +
            '<span class="badge" style="background:' + m.color + '">' + m.status_label + '</span>' +
            (m.venue ? '<br>' + m.venue : '')
          );

        new mapboxgl.Marker(el)
          .setLngLat([m.lng, m.lat])
          .setPopup(popup)
          .addTo(map);
      });
    });
});
</script>
{% endblock %}
