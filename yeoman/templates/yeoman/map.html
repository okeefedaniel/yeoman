{% extends "base.html" %}

{% block title %}Map{% endblock %}

{% block extra_css %}
<link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
<style>#map { height: 600px; border-radius: 0.375rem; }</style>
{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Event Map</h2>
    <a href="{% url 'yeoman:invitation_list' %}" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-list me-1"></i>List View
    </a>
  </div>
  <div class="card">
    <div class="card-body">
      <div id="map"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Center on Connecticut
  var map = L.map('map').setView([41.6, -72.7], 9);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  fetch('{% url "yeoman:map_markers_json" %}')
    .then(r => r.json())
    .then(function(markers) {
      markers.forEach(function(m) {
        var circle = L.circleMarker([m.lat, m.lng], {
          radius: 8,
          fillColor: m.color,
          color: '#fff',
          weight: 2,
          opacity: 1,
          fillOpacity: 0.8
        }).addTo(map);
        circle.bindPopup(
          '<strong><a href="' + m.url + '">' + m.title + '</a></strong><br>' +
          m.date + '<br>' +
          '<span class="badge" style="background:' + m.color + '">' + m.status_label + '</span><br>' +
          (m.venue ? m.venue : '')
        );
      });
    });
});
</script>
{% endblock %}
